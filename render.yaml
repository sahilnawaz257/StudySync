services:
  # ==========================================
  # PRODUCTION ENVIRONMENT (Main Branch)
  # ==========================================
  - type: web
    name: library-attendance-backend
    runtime: node
    plan: free
    rootDir: server
    branch: main
    buildCommand: npm install --include=dev --legacy-peer-deps && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SENDER_EMAIL
        sync: false

  - type: web
    name: library-attendance-frontend
    runtime: static
    rootDir: client
    branch: main
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

  # ==========================================
  # DEVELOPMENT ENVIRONMENT (Dev Branch)
  # ==========================================
  - type: web
    name: library-attendance-backend-dev
    runtime: node
    plan: free
    rootDir: server
    branch: dev
    buildCommand: npm install --include=dev --legacy-peer-deps && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SENDER_EMAIL
        sync: false

  - type: web
    name: library-attendance-frontend-dev
    runtime: static
    rootDir: client
    branch: dev
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
